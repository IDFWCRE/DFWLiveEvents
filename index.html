<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover upcoming concerts and live music events in Fort Worth, Texas.">
  <title>DFW Live Events | Fort Worth Concerts</title>
  <style>
    :root {
      --bg: #0d0e11;
      --surface: #16181d;
      --surface-2: #1e2026;
      --border: rgba(255, 255, 255, 0.09);
      --text: #f8f6f2;
      --muted: #a7a8ad;
      --orange: #ff6b1a;
      --orange-light: #ff9a5e;
      --orange-dark: #d94d00;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
      scroll-behavior: smooth;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 85% -10%, rgba(255, 107, 26, 0.17), transparent 30rem),
        radial-gradient(circle at -10% 25%, rgba(255, 107, 26, 0.08), transparent 26rem),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    a {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .site-header {
      border-bottom: 1px solid var(--border);
      background: rgba(13, 14, 17, 0.78);
      backdrop-filter: blur(18px);
    }

    .header-inner,
    main,
    .footer-inner {
      width: min(1180px, calc(100% - 40px));
      margin-inline: auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 78px;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
    }

    .logo {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid rgba(255, 107, 26, 0.35);
      border-radius: 13px;
      background: linear-gradient(145deg, rgba(255, 107, 26, 0.22), rgba(255, 107, 26, 0.06));
      box-shadow: 0 8px 24px rgba(255, 107, 26, 0.13);
    }

    .logo svg {
      width: 23px;
      height: 23px;
      fill: var(--orange);
    }

    .brand-text {
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-text span {
      color: var(--orange);
    }

    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 650;
    }

    .location-pill svg {
      width: 16px;
      fill: var(--orange);
    }

    main {
      padding: 70px 0 80px;
    }

    .hero {
      max-width: 780px;
      margin-bottom: 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 13px;
      color: var(--orange-light);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 24px;
      height: 2px;
      border-radius: 99px;
      background: var(--orange);
      content: "";
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(2.7rem, 7vw, 5.4rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    h1 span {
      color: var(--orange);
    }

    .hero-copy {
      max-width: 620px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.14rem);
    }

    .controls {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(22, 24, 29, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      top: 50%;
      left: 16px;
      width: 19px;
      height: 19px;
      fill: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      height: 50px;
      padding: 0 16px 0 47px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 13px;
      outline: none;
      background: var(--bg);
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    #searchInput::placeholder {
      color: #777980;
    }

    #searchInput:focus {
      border-color: rgba(255, 107, 26, 0.65);
      box-shadow: 0 0 0 3px rgba(255, 107, 26, 0.12);
    }

    .filter-group {
      display: flex;
      gap: 7px;
    }

    .region-filter-row {
      display: flex;
      grid-column: 1 / -1;
      align-items: center;
      gap: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .filter-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .region-filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .filter-button {
      min-height: 42px;
      padding: 8px 13px;
      color: var(--muted);
      white-space: nowrap;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 11px;
      background: transparent;
      font-size: 0.84rem;
      font-weight: 750;
      transition: color 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .filter-button:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .filter-button.active {
      color: #fff;
      border-color: var(--orange);
      background: var(--orange-dark);
      box-shadow: 0 5px 16px rgba(217, 77, 0, 0.22);
    }

    .results-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin: 0 2px 18px;
    }

    .results-meta h2 {
      margin: 0;
      font-size: 1.25rem;
      letter-spacing: -0.025em;
    }

    #resultCount {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .event-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .event-card {
      position: relative;
      display: flex;
      min-width: 0;
      overflow: hidden;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.2);
      transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    }

    .event-card:hover {
      border-color: rgba(255, 107, 26, 0.34);
      box-shadow: 0 20px 46px rgba(0, 0, 0, 0.33);
      transform: translateY(-5px);
    }

    .image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 10;
      background: var(--surface-2);
    }

    .event-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 500ms ease;
    }

    .event-card:hover .event-image {
      transform: scale(1.035);
    }

    .image-wrap::after {
      position: absolute;
      inset: auto 0 0;
      height: 45%;
      background: linear-gradient(transparent, rgba(12, 13, 16, 0.76));
      content: "";
      pointer-events: none;
    }

    .venue-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 58px 34px 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 78% 18%, rgba(255, 107, 26, 0.25), transparent 28%),
        radial-gradient(circle at 16% 82%, rgba(217, 77, 0, 0.16), transparent 34%),
        linear-gradient(145deg, #24262d 0%, #15161b 48%, #0d0e11 100%);
      color: rgba(248, 246, 242, 0.88);
      text-align: center;
    }

    .venue-placeholder::before {
      position: absolute;
      width: 190px;
      height: 190px;
      border: 1px solid rgba(255, 107, 26, 0.13);
      border-radius: 50%;
      content: "";
    }

    .venue-placeholder span {
      position: relative;
      z-index: 1;
      max-width: 260px;
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      font-weight: 850;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .date-badge {
      position: absolute;
      z-index: 1;
      top: 14px;
      left: 14px;
      min-width: 52px;
      padding: 8px 9px;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(13, 14, 17, 0.82);
      text-align: center;
      backdrop-filter: blur(9px);
    }

    .date-badge strong,
    .date-badge span {
      display: block;
      line-height: 1;
    }

    .date-badge strong {
      margin-bottom: 4px;
      color: var(--orange-light);
      font-size: 0.72rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .date-badge span {
      font-size: 1.25rem;
      font-weight: 850;
    }

    .card-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding: 21px;
    }

    .performer {
      margin: 0 0 6px;
      overflow: hidden;
      color: var(--orange-light);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.09em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .event-title {
      display: -webkit-box;
      min-height: 2.7em;
      margin: 0 0 17px;
      overflow: hidden;
      font-size: 1.14rem;
      line-height: 1.35;
      letter-spacing: -0.025em;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .details {
      display: grid;
      gap: 9px;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: start;
      gap: 9px;
    }

    .detail-row svg {
      width: 17px;
      height: 17px;
      margin-top: 2px;
      fill: var(--orange);
    }

    .ticket-button {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 47px;
      margin-top: auto;
      padding: 10px 15px;
      color: #fff;
      border-radius: 12px;
      background: var(--orange-dark);
      font-size: 0.9rem;
      font-weight: 800;
      text-decoration: none;
      transition: background 160ms ease, transform 160ms ease;
    }

    .ticket-button:hover {
      background: var(--orange);
      transform: translateY(-1px);
    }

    .ticket-button svg {
      width: 17px;
      fill: currentColor;
    }

    .skeleton {
      pointer-events: none;
    }

    .skeleton-block,
    .skeleton-line {
      overflow: hidden;
      background: #24262c;
    }

    .skeleton-block::after,
    .skeleton-line::after {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.065), transparent);
      animation: shimmer 1.35s infinite;
      content: "";
      transform: translateX(-100%);
    }

    .skeleton-block {
      aspect-ratio: 16 / 10;
    }

    .skeleton-line {
      height: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    .skeleton-line.short {
      width: 34%;
    }

    .skeleton-line.medium {
      width: 72%;
    }

    .skeleton-line.title {
      width: 92%;
      height: 20px;
      margin-bottom: 24px;
    }

    .skeleton-line.button {
      width: 100%;
      height: 47px;
      margin: 18px 0 0;
      border-radius: 12px;
    }

    @keyframes shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .status-panel {
      grid-column: 1 / -1;
      display: grid;
      min-height: 290px;
      place-items: center;
      padding: 42px 20px;
      border: 1px dashed rgba(255, 255, 255, 0.13);
      border-radius: var(--radius);
      background: rgba(22, 24, 29, 0.54);
      text-align: center;
    }

    .status-content {
      max-width: 460px;
    }

    .status-icon {
      display: grid;
      width: 58px;
      height: 58px;
      margin: 0 auto 17px;
      place-items: center;
      border: 1px solid rgba(255, 107, 26, 0.25);
      border-radius: 17px;
      background: rgba(255, 107, 26, 0.1);
    }

    .status-icon svg {
      width: 28px;
      fill: var(--orange);
    }

    .status-content h3 {
      margin: 0 0 7px;
      font-size: 1.25rem;
    }

    .status-content p {
      margin: 0;
      color: var(--muted);
    }

    .retry-button {
      margin-top: 18px;
      padding: 10px 18px;
      color: #fff;
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      background: var(--orange-dark);
      font-weight: 800;
    }

    footer {
      border-top: 1px solid var(--border);
      color: var(--muted);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 78px;
      gap: 20px;
      font-size: 0.82rem;
    }

    .footer-inner a {
      color: var(--orange-light);
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .filter-group {
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: thin;
      }

      .event-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .header-inner,
      main,
      .footer-inner {
        width: min(100% - 28px, 1180px);
      }

      .header-inner {
        min-height: 68px;
      }

      .location-pill {
        display: none;
      }

      main {
        padding: 48px 0 58px;
      }

      .hero {
        margin-bottom: 31px;
      }

      h1 {
        font-size: clamp(2.65rem, 14vw, 4.25rem);
      }

      .hero-copy {
        margin-top: 18px;
      }

      .controls {
        margin-inline: -2px;
        padding: 11px;
      }

      .filter-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-right: 0;
        padding-right: 0;
        overflow: visible;
      }

      .region-filter-row {
        align-items: stretch;
        flex-direction: column;
        gap: 9px;
      }

      .region-filter-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-button {
        width: 100%;
      }

      .event-grid {
        grid-template-columns: 1fr;
      }

      .event-card {
        border-radius: 18px;
      }

      .footer-inner {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        padding-block: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="#" aria-label="DFW Live Events home">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M9 18V5l11-2v13.2a3.5 3.5 0 1 1-2-3.16V7.4L11 8.67V18.2a3.5 3.5 0 1 1-2-.2Z"/>
          </svg>
        </span>
        <span class="brand-text">DFW <span>Live</span> Events</span>
      </a>
      <div class="location-pill">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/>
        </svg>
        Dallas-Fort Worth, Texas
      </div>
    </div>
  </header>

  <main>
    <section class="hero" aria-labelledby="pageTitle">
      <p class="eyebrow">Your local live music guide</p>
      <h1 id="pageTitle">Find your next <span>live show.</span></h1>
      <p class="hero-copy">Discover upcoming concerts, rising artists, and unforgettable nights across Dallas-Fort Worth.</p>
    </section>

    <section aria-label="Event search and filters">
      <div class="controls">
        <label class="search-wrap">
          <span style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Search artists or venues</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 19.6-4.8-4.8a7.7 7.7 0 1 0-1.4 1.4l4.8 4.8 1.4-1.4ZM5 10.5a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0Z"/>
          </svg>
          <input id="searchInput" type="search" placeholder="Search by artist or venue..." autocomplete="off">
        </label>

        <div class="filter-group" role="group" aria-label="Filter events by date">
          <button class="filter-button" type="button" data-date-filter="today">Today</button>
          <button class="filter-button" type="button" data-date-filter="week">This Week</button>
          <button class="filter-button" type="button" data-date-filter="month">This Month</button>
          <button class="filter-button active" type="button" data-date-filter="all" aria-pressed="true">All Upcoming</button>
        </div>

        <div class="region-filter-row">
          <span class="filter-label">Region</span>
          <div class="region-filter-group" role="group" aria-label="Filter events by city">
            <button class="filter-button active" type="button" data-region-filter="all" aria-pressed="true">All DFW</button>
            <button class="filter-button" type="button" data-region-filter="fort worth">Fort Worth</button>
            <button class="filter-button" type="button" data-region-filter="dallas">Dallas</button>
            <button class="filter-button" type="button" data-region-filter="denton">Denton</button>
            <button class="filter-button" type="button" data-region-filter="arlington">Arlington</button>
          </div>
        </div>
      </div>
    </section>

    <section aria-labelledby="eventsHeading" aria-live="polite">
      <div class="results-meta">
        <h2 id="eventsHeading">Upcoming Events</h2>
        <span id="resultCount">Loading events...</span>
      </div>
      <div id="eventGrid" class="event-grid"></div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <span>&copy; <span id="currentYear"></span> DFW Live Events</span>
      <span>Event data powered by <a href="https://www.ticketmaster.com/" target="_blank" rel="noopener noreferrer">Ticketmaster</a></span>
    </div>
  </footer>

  <script>
    const API_KEY = "7iA2eq9WLkuUVGbhPIyIOXAGGnliezaF";
    const API_BASE_URL = "https://app.ticketmaster.com/discovery/v2/events.json";
    const DFW_CITIES = ["Fort Worth", "Dallas", "Denton", "Arlington"];
    const API_PARAMS = {
      apikey: API_KEY,
      stateCode: "TX",
      countryCode: "US",
      classificationName: "music",
      size: "20",
      sort: "date,asc"
    };

    const eventGrid = document.getElementById("eventGrid");
    const searchInput = document.getElementById("searchInput");
    const resultCount = document.getElementById("resultCount");
    const dateFilterButtons = [...document.querySelectorAll("[data-date-filter]")];
    const regionFilterButtons = [...document.querySelectorAll("[data-region-filter]")];
    const filterButtons = [...dateFilterButtons, ...regionFilterButtons];

    let allEvents = [];
    let activeFilter = "all";
    let activeRegion = "all";

    const icons = {
      calendar: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h2v2h6V2h2v2h1a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V2Zm11 8H6v9a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-9Z"/></svg>',
      pin: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/></svg>',
      arrow: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 5h5v5h-2V8.41l-8.3 8.3-1.4-1.42L15.58 7H14V5ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg>',
      music: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 18V5l11-2v13.2a3.5 3.5 0 1 1-2-3.16V7.4L11 8.67V18.2a3.5 3.5 0 1 1-2-.2Z"/></svg>',
      alert: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 1.5 21h21L12 2Zm1 15h-2v-2h2v2Zm0-4h-2V8h2v5Z"/></svg>'
    };

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getEventDate(event) {
      const localDate = event.dates?.start?.localDate;
      const localTime = event.dates?.start?.localTime || "00:00:00";
      if (localDate) {
        return new Date(`${localDate}T${localTime}`);
      }
      return new Date(event.dates?.start?.dateTime);
    }

    function getFortWorthToday() {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/Chicago",
        year: "numeric",
        month: "numeric",
        day: "numeric"
      }).formatToParts(new Date());
      const values = Object.fromEntries(parts.map((part) => [part.type, part.value]));
      return new Date(Number(values.year), Number(values.month) - 1, Number(values.day));
    }

    function getPerformer(event) {
      const attractions = event._embedded?.attractions || [];
      return attractions.map((attraction) => attraction.name).filter(Boolean).join(", ") || "Live Music";
    }

    function getVenue(event) {
      return event._embedded?.venues?.[0]?.name || "Venue to be announced";
    }

    function getCity(event) {
      return event._embedded?.venues?.[0]?.city?.name || event._requestedCity || "";
    }

    function getBestImage(images = []) {
      if (!images.length) return "";
      const landscapeImages = images.filter((image) => image.ratio === "16_9");
      const pool = landscapeImages.length ? landscapeImages : images;
      return [...pool].sort((a, b) => (b.width || 0) - (a.width || 0))[0]?.url || "";
    }

    function normalizeKey(value = "") {
      return value.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function deduplicateEvents(events) {
      const uniqueEvents = new Map();

      events.forEach((event) => {
        const key = [
          normalizeKey(event.name),
          normalizeKey(getVenue(event)),
          event.dates?.start?.localDate || ""
        ].join("|");

        if (!uniqueEvents.has(key)) {
          uniqueEvents.set(key, event);
        }
      });

      return [...uniqueEvents.values()].sort((a, b) => getEventDate(a) - getEventDate(b));
    }

    function formatDateTime(event) {
      const date = getEventDate(event);
      if (Number.isNaN(date.getTime())) return "Date and time to be announced";

      const dateText = new Intl.DateTimeFormat("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(date);

      if (event.dates?.start?.noSpecificTime || !event.dates?.start?.localTime) {
        return dateText;
      }

      const timeText = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
      return `${dateText} · ${timeText}`;
    }

    function isInActiveDateRange(event) {
      if (activeFilter === "all") return true;

      const eventDate = getEventDate(event);
      if (Number.isNaN(eventDate.getTime())) return false;

      const startToday = getFortWorthToday();
      const startTomorrow = new Date(
        startToday.getFullYear(),
        startToday.getMonth(),
        startToday.getDate() + 1
      );

      if (activeFilter === "today") {
        return eventDate >= startToday && eventDate < startTomorrow;
      }

      if (activeFilter === "week") {
        const endOfWeek = new Date(startToday);
        const daysUntilSunday = 7 - startToday.getDay();
        endOfWeek.setDate(startToday.getDate() + daysUntilSunday);
        return eventDate >= startToday && eventDate < endOfWeek;
      }

      if (activeFilter === "month") {
        const startNextMonth = new Date(startToday.getFullYear(), startToday.getMonth() + 1, 1);
        return eventDate >= startToday && eventDate < startNextMonth;
      }

      return true;
    }

    function createCard(event) {
      const eventDate = getEventDate(event);
      const validDate = !Number.isNaN(eventDate.getTime());
      const month = validDate ? new Intl.DateTimeFormat("en-US", { month: "short" }).format(eventDate) : "TBA";
      const day = validDate ? eventDate.getDate() : "–";
      const eventName = escapeHTML(event.name || "Untitled Event");
      const performer = escapeHTML(getPerformer(event));
      const venue = escapeHTML(getVenue(event));
      const imageUrl = escapeHTML(getBestImage(event.images));
      const ticketUrl = escapeHTML(event.url || "https://www.ticketmaster.com/");
      const imageMarkup = imageUrl
        ? `<img class="event-image" src="${imageUrl}" alt="" loading="lazy" onerror="this.remove()">`
        : "";

      return `
        <article class="event-card">
          <div class="image-wrap">
            <div class="venue-placeholder" aria-hidden="true"><span>${venue}</span></div>
            ${imageMarkup}
            <div class="date-badge" aria-hidden="true">
              <strong>${escapeHTML(month)}</strong>
              <span>${day}</span>
            </div>
          </div>
          <div class="card-body">
            <p class="performer" title="${performer}">${performer}</p>
            <h3 class="event-title">${eventName}</h3>
            <div class="details">
              <div class="detail-row">${icons.calendar}<span>${escapeHTML(formatDateTime(event))}</span></div>
              <div class="detail-row">${icons.pin}<span>${venue}</span></div>
            </div>
            <a class="ticket-button" href="${ticketUrl}" target="_blank" rel="noopener noreferrer"
              aria-label="Get tickets for ${eventName}">
              <span>Get Tickets</span>${icons.arrow}
            </a>
          </div>
        </article>
      `;
    }

    function renderSkeletons() {
      eventGrid.innerHTML = Array.from({ length: 6 }, () => `
        <article class="event-card skeleton" aria-hidden="true">
          <div class="skeleton-block"></div>
          <div class="card-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line title"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line button"></div>
          </div>
        </article>
      `).join("");
    }

    function renderStatus(type, title, message, showRetry = false) {
      const icon = type === "error" ? icons.alert : icons.music;
      eventGrid.innerHTML = `
        <div class="status-panel">
          <div class="status-content">
            <div class="status-icon">${icon}</div>
            <h3>${escapeHTML(title)}</h3>
            <p>${escapeHTML(message)}</p>
            ${showRetry ? '<button class="retry-button" type="button" id="retryButton">Try Again</button>' : ""}
          </div>
        </div>
      `;

      if (showRetry) {
        document.getElementById("retryButton").addEventListener("click", fetchEvents);
      }
    }

    function applyFilters() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const filteredEvents = allEvents.filter((event) => {
        const matchesSearch = !searchTerm ||
          getPerformer(event).toLowerCase().includes(searchTerm) ||
          getVenue(event).toLowerCase().includes(searchTerm);
        const matchesRegion = activeRegion === "all" ||
          getCity(event).trim().toLowerCase() === activeRegion;
        return matchesSearch && matchesRegion && isInActiveDateRange(event);
      });

      resultCount.textContent = `${filteredEvents.length} ${filteredEvents.length === 1 ? "event" : "events"}`;

      if (!filteredEvents.length) {
        renderStatus(
          "empty",
          "No events found",
          "Try another region, date range, artist, or venue."
        );
        return;
      }

      eventGrid.innerHTML = filteredEvents.map(createCard).join("");
    }

    async function fetchEvents() {
      renderSkeletons();
      resultCount.textContent = "Loading events...";
      searchInput.disabled = true;
      filterButtons.forEach((button) => button.disabled = true);

      try {
        const requests = DFW_CITIES.map(async (city) => {
          const url = new URL(API_BASE_URL);
          Object.entries({ ...API_PARAMS, city }).forEach(([key, value]) => {
            url.searchParams.set(key, value);
          });

          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`${city} request failed with status ${response.status}`);
          }

          const data = await response.json();
          return (data._embedded?.events || []).map((event) => ({
            ...event,
            _requestedCity: city
          }));
        });

        const results = await Promise.allSettled(requests);
        const successfulResults = results
          .filter((result) => result.status === "fulfilled")
          .flatMap((result) => result.value);

        results
          .filter((result) => result.status === "rejected")
          .forEach((result) => console.warn("A regional event request failed:", result.reason));

        if (!successfulResults.length && results.some((result) => result.status === "rejected")) {
          throw new Error("All regional Ticketmaster requests failed");
        }

        allEvents = deduplicateEvents(successfulResults);

        if (!allEvents.length) {
          resultCount.textContent = "0 events";
          renderStatus(
            "empty",
            "Nothing on the calendar yet",
            "No upcoming DFW music events were found. Check back soon for new shows."
          );
          return;
        }

        applyFilters();
      } catch (error) {
        console.error("Unable to load Ticketmaster events:", error);
        resultCount.textContent = "Events unavailable";
        renderStatus(
          "error",
          "We couldn't load the lineup",
          "Something went wrong while contacting Ticketmaster. Please check your connection and try again.",
          true
        );
      } finally {
        searchInput.disabled = false;
        filterButtons.forEach((button) => button.disabled = false);
      }
    }

    searchInput.addEventListener("input", applyFilters);

    dateFilterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.dateFilter;
        dateFilterButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("active", isActive);
          item.setAttribute("aria-pressed", String(isActive));
        });
        applyFilters();
      });
    });

    regionFilterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeRegion = button.dataset.regionFilter;
        regionFilterButtons.forEach((item) => {
          const isActive = item === button;
          item.classList.toggle("active", isActive);
          item.setAttribute("aria-pressed", String(isActive));
        });
        applyFilters();
      });
    });

    document.getElementById("currentYear").textContent = new Date().getFullYear();
    fetchEvents();
  </script>
</body>
</html>
